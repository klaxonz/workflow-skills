name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: node scripts/validate.js

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci --ignore-scripts 2>/dev/null || true
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create archive
        run: |
          mkdir -p dist
          git archive --format=tar.gz --prefix=workflow-skills/ -o dist/workflow-skills.tar.gz HEAD
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/workflow-skills.tar.gz
          generate_release_notes: true
